
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Libraria — Book</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <div id="sidebar-slot"></div>

    <main class="main">
      <a href="home.html" class="btn btn-outline btn-sm mb-4" data-testid="back-home">
        <i data-lucide="arrow-left" style="width:14px;height:14px;"></i> Back
      </a>

      <div id="book-detail" class="book-detail" data-testid="book-detail"></div>

      <div class="panel mt-6">
        <h2>Reviews</h2>
        <div id="review-list" class="review-list mt-4" data-testid="review-list"></div>
      </div>
    </main>
  </div>

  <!-- QR modal -->
  <div id="qr-modal" class="modal-backdrop">
    <div class="modal">
      <h2>Your borrow QR</h2>
      <p class="text-soft mb-4">Show this code to a librarian to confirm borrow.</p>
      <div class="qr-display">
        <div id="qr-canvas"></div>
        <div class="code-text" data-testid="qr-code-text" id="qr-code-text"></div>
      </div>
      <div class="modal-actions">
        <button id="qr-close" class="btn btn-secondary" data-testid="qr-close">Close</button>
      </div>
    </div>
  </div>

  <!-- Review modal -->
  <div id="review-modal" class="modal-backdrop">
    <div class="modal">
      <h2>Write a review</h2>
      <div class="form-group">
        <label>Rating</label>
        <select id="review-rating" class="form-control" data-testid="review-rating">
          <option value="5">★★★★★ — Excellent</option>
          <option value="4">★★★★☆ — Good</option>
          <option value="3">★★★☆☆ — Average</option>
          <option value="2">★★☆☆☆ — Poor</option>
          <option value="1">★☆☆☆☆ — Terrible</option>
        </select>
      </div>
      <div class="form-group">
        <label>Comment</label>
        <textarea id="review-comment" class="form-control" data-testid="review-comment" rows="4"></textarea>
      </div>
      <div class="modal-actions">
        <button id="review-cancel" class="btn btn-outline" data-testid="review-cancel">Cancel</button>
        <button id="review-submit" class="btn btn-primary" data-testid="review-submit">Post review</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/app.js"></script>
  <script src="js/books.js"></script>
  <script>initBookPage();</script>
</body>
</html>
