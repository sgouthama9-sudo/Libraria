
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Libraria — My borrowings</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <div id="sidebar-slot"></div>

    <main class="main">
      <h1 class="mb-4">My borrowings</h1>

      <div class="tabs">
        <button class="tab-btn active" data-tab="tab-active"   data-testid="tab-active">Active</button>
        <button class="tab-btn"        data-tab="tab-history"  data-testid="tab-history">History</button>
        <button class="tab-btn"        data-tab="tab-fines"    data-testid="tab-fines">Fines &amp; payments</button>
      </div>

      <div id="tab-active"  class="tab-content active"><div id="active-list"></div></div>
      <div id="tab-history" class="tab-content"><div id="history-list"></div></div>
      <div id="tab-fines"   class="tab-content"><div id="fines-list"></div></div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/app.js"></script>
  <script src="js/borrow.js"></script>
  <script>
    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById(btn.dataset.tab).classList.add("active");
      });
    });
    initBorrowingsPage();
  </script>
</body>
</html>
