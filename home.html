
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Libraria — Home</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <div id="sidebar-slot"></div>

    <main class="main">
      <div class="page-head">
        <h1>Discover books</h1>
        <div class="search-bar">
          <i data-lucide="search" style="width:18px;height:18px;color:var(--text-soft);"></i>
          <input type="text" id="search-input" data-testid="search-input" placeholder="Search by title or author..." />
          <select id="filter-domain" data-testid="filter-domain"></select>
        </div>
      </div>

      <div class="content-grid">
        <section>
          <div id="book-grid" class="book-grid" data-testid="book-grid"></div>
        </section>

        <aside>
          <div class="panel mb-4">
            <h2>Notice board</h2>
            <div id="notice-board" class="notice-board" data-testid="notice-board">
              <p class="text-soft">Loading notices...</p>
            </div>
          </div>

          <div class="panel" style="height:fit-content;">
            <h2>Recommended</h2>
            <p class="text-soft mb-4" style="font-size:0.85rem;">Picked for you</p>
            <div id="recommend-list" class="recommend-list" data-testid="recommend-list"></div>
          </div>
        </aside>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/app.js"></script>
  <script src="js/books.js"></script>
  <script>initHomePage();</script>
</body>
</html>
