<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Libraria — Sign in</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main class="auth-shell">
    <div class="auth-card" data-testid="auth-card">
      <h1>Welcome to <span style="color:var(--taupe)">Libraria</span></h1>
      <p class="subtitle">Your campus library — books, borrowings, and everything in between.</p>

      <div class="tabs" style="margin-bottom: 24px;">
        <button class="tab-btn active" data-tab="tab-login"  data-testid="tab-login">Sign in</button>
        <button class="tab-btn"        data-tab="tab-signup" data-testid="tab-signup">Create account</button>
      </div>

      <!-- LOGIN -->
      <div id="tab-login" class="tab-content active">
        <form id="form-login" data-testid="form-login">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="login-email" class="form-control" data-testid="login-email" required />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="login-password" class="form-control" data-testid="login-password" required />
          </div>
          <button type="submit" class="btn btn-primary btn-block" data-testid="btn-login-submit">Sign in</button>
        </form>
      </div>

      <!-- SIGNUP -->
      <div id="tab-signup" class="tab-content">
        <form id="form-signup" data-testid="form-signup">
          <div class="form-group">
            <label>Full name</label>
            <input type="text" id="signup-name" class="form-control" data-testid="signup-name" required />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Student ID</label>
              <input type="text" id="signup-student-id" class="form-control" data-testid="signup-student-id" />
            </div>
            <div class="form-group">
              <label>Department</label>
              <input type="text" id="signup-department" class="form-control" data-testid="signup-department" />
            </div>
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="signup-email" class="form-control" data-testid="signup-email" required />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="signup-password" class="form-control" data-testid="signup-password" required minlength="6" />
          </div>
          <button type="submit" class="btn btn-primary btn-block" data-testid="btn-signup-submit">Create account</button>
        </form>
      </div>

      <div class="divider">or continue with</div>
      <button id="btn-google" class="btn btn-outline btn-block" data-testid="btn-google">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.2 7.9 3.1l5.7-5.7C34.9 6.5 29.8 4.5 24 4.5 13.2 4.5 4.5 13.2 4.5 24S13.2 43.5 24 43.5 43.5 34.8 43.5 24c0-1.2-.1-2.4-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 16 18.9 13.5 24 13.5c3.1 0 5.8 1.2 7.9 3.1l5.7-5.7C34.9 6.5 29.8 4.5 24 4.5 16.3 4.5 9.7 8.8 6.3 14.7z"/><path fill="#4CAF50" d="M24 43.5c5.7 0 10.8-2 14.7-5.3l-6.8-5.6c-2 1.4-4.7 2.4-7.9 2.4-5.2 0-9.6-3.3-11.2-7.9l-6.6 5.1C9.6 38.9 16.2 43.5 24 43.5z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.2 5.6l6.8 5.6c-.5.4 7.6-5.5 7.6-15.2 0-1.2-.1-2.4-.4-3.5z"/></svg>
        Continue with Google
      </button>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
